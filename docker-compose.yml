version: '3.9'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://cvforge:cvforge@db:5432/cvforge
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL}
    volumes:
      - ./context:/app/context
      - ./generated:/app/generated
      - ./uploads:/app/uploads
    # Run as host user to ensure proper permissions on mounted volumes
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cvforge
      POSTGRES_PASSWORD: cvforge
      POSTGRES_DB: cvforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: